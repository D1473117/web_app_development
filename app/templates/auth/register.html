{% extends 'base.html' %}
{% block title %}註冊 - 食譜收藏夾{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="glass-form animate-fade-in">
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                    <i class="fa-solid fa-user-plus fs-1"></i>
                </div>
                <h2 class="text-primary fw-bold">建立新帳號</h2>
                <p class="text-muted">立即註冊，準備打造您的個人食譜寶庫</p>
            </div>
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="mb-4">
                    <label for="email" class="form-label text-secondary fw-semibold ms-1">您的電子信箱</label>
                    <input type="email" class="form-control form-control-lg bg-light border-0 shadow-sm" id="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-secondary fw-semibold ms-1">設定強密碼</label>
                    <input type="password" class="form-control form-control-lg bg-light border-0 shadow-sm" id="password" name="password" placeholder="建議 8 個字元以上" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 btn-lg mb-4 fw-bold">免費註冊</button>
                <div class="text-center text-muted">
                    已經有帳號了？ <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none fw-bold ms-1">立即登入</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
