{% extends 'base.html' %}
{% block title %}登入 - 食譜收藏夾{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="glass-form">
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                    <i class="fa-solid fa-right-to-bracket fs-1"></i>
                </div>
                <h2 class="text-primary fw-bold">歡迎回來</h2>
                <p class="text-muted">登入以管理您的專屬食譜與收藏</p>
            </div>
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-4">
                    <label for="email" class="form-label text-secondary fw-semibold ms-1">電子信箱</label>
                    <input type="email" class="form-control form-control-lg bg-light border-0 shadow-sm" id="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-secondary fw-semibold ms-1">密碼</label>
                    <input type="password" class="form-control form-control-lg bg-light border-0 shadow-sm" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 btn-lg mb-4 fw-bold">登入帳號</button>
                <div class="text-center text-muted">
                    還沒有帳號嗎？ <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none fw-bold ms-1">免費註冊</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
